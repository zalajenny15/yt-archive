name: Keep Supabase Awake

# Cada 25 minutos
on:
  schedule:
    - cron: '*/25 * * * *' 
  workflow_dispatch: # Permite ejecutarlo manualmente también

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Vercel page
        run: |
          echo "Haciendo ping a la página..."
          curl -s https://verdad-o-reto-gold.vercel.app/ > /dev/null
          echo "Ping completado ✅"
