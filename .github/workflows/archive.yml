name: YouTube Archive HYBRID CLEAN

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: youtube-archive
  cancel-in-progress: false

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -U yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 --decode > ~/.config/rclone/rclone.conf

      - name: Cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      # 📥 HISTORIAL
      - name: Download archive
        run: |
          rclone copy gdrive:YouTubeArchive/archive.txt . || true

      # ⚡ RSS (rápido, incluye streams guardados)
      - name: Download RSS
        run: |
          if [ -s feeds.txt ]; then
            yt-dlp \
            --match-filter "live_status!=is_upcoming" \
            --playlist-end 5 \
            --js-runtimes node \
            --cookies cookies.txt \
            --ignore-errors \
            --no-abort-on-error \
            --download-archive archive.txt \
            --no-overwrites \
            --merge-output-format mp4 \
            --embed-thumbnail \
            --add-metadata \
            --sleep-requests 2 \
            --sleep-interval 3 \
            --max-sleep-interval 10 \
            -f "bestvideo[ext=mp4][vcodec^=avc1][height<=2160]+bestaudio[ext=m4a]/bestvideo[ext=mp4][height<=2160]+bestaudio[ext=m4a]/best[ext=mp4]" \
            -o "videos/%(uploader)s/%(upload_date>%Y/%m/%d)s/%(title).200s.%(ext)s" \
            -a feeds.txt || true
          else
            echo "feeds.txt vacío"
          fi

      # 🧠 BACKUP (uploads directos → rápido)
      - name: Download uploads
        run: |
          if [ -s uploads.txt ]; then
            yt-dlp \
            --playlist-end 5 \
            --js-runtimes node \
            --cookies cookies.txt \
            --ignore-errors \
            --no-abort-on-error \
            --download-archive archive.txt \
            --no-overwrites \
            --merge-output-format mp4 \
            --embed-thumbnail \
            --add-metadata \
            --sleep-requests 2 \
            --sleep-interval 5 \
            --max-sleep-interval 15 \
            -f "bestvideo[ext=mp4][vcodec^=avc1][height<=2160]+bestaudio[ext=m4a]/bestvideo[ext=mp4][height<=2160]+bestaudio[ext=m4a]/best[ext=mp4]" \
            -o "videos/%(uploader)s/%(upload_date>%Y/%m/%d)s/%(title).200s.%(ext)s" \
            -a uploads.txt || true
          else
            echo "uploads.txt vacío"
          fi

      # ☁️ SUBIDA SEGURA
      - name: Upload
        run: |
          [ -d videos ] && rclone move videos gdrive:YouTubeArchive/videos --create-empty-src-dirs || true

      # 💾 GUARDAR HISTORIAL
      - name: Save archive
        run: |
          rclone copy archive.txt gdrive:YouTubeArchive/ || true

      # 🧹 LIMPIEZA
      - name: Cleanup
        run: |
          rm -rf videos
