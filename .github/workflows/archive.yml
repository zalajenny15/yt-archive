name: YouTube Archive HYBRID

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: youtube-archive
  cancel-in-progress: false

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -U "yt-dlp @ https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz"
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 --decode > ~/.config/rclone/rclone.conf

      # 🔐 COOKIES
      - name: Write cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      # 🔥 BAJAR HISTORIAL
      - name: Download archive
        run: |
          rclone copy gdrive:YouTubeArchive/archive.txt . || echo "no archive yet"

      # ⚡ RSS (ULTRA ROBUSTO)
      - name: Download from RSS
        run: |
          if [ ! -s feeds.txt ]; then
            echo "feeds.txt vacío o no existe"
          else
            yt-dlp \
            --match-filter "!is_live" \
            --cookies cookies.txt \
            --ignore-errors \
            --no-abort-on-error \
            --skip-unavailable-fragments \
            --extractor-retries 5 \
            --retries 10 \
            --fragment-retries 10 \
            --sleep-requests 3 \
            --sleep-interval 5 \
            --max-sleep-interval 20 \
            --force-ipv4 \
            --http-chunk-size 10M \
            --download-archive archive.txt \
            --no-overwrites \
            --merge-output-format mp4 \
            --embed-thumbnail \
            --add-metadata \
            -f "bestvideo[ext=mp4][vcodec^=avc1][height<=2160]+bestaudio[ext=m4a]/bestvideo[ext=mp4][height<=2160]+bestaudio[ext=m4a]/best[ext=mp4]" \
            -o "%(uploader)s/%(upload_date>%Y/%m/%d)s/%(title).200s.%(ext)s" \
            -a feeds.txt || true
          fi

      # 🧠 CANALES (RESPALDO ROBUSTO)
      - name: Download from channels
        run: |
          if [ ! -s canales.txt ]; then
            echo "canales.txt vacío o no existe"
          else
            yt-dlp \
            --match-filter "!is_live & live_status!=upcoming" \
            --cookies cookies.txt \
            --ignore-errors \
            --no-abort-on-error \
            --skip-unavailable-fragments \
            --extractor-retries 5 \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 5 \
            --sleep-requests 3 \
            --sleep-interval 10 \
            --max-sleep-interval 30 \
            --force-ipv4 \
            --http-chunk-size 10M \
            --download-archive archive.txt \
            --no-overwrites \
            --merge-output-format mp4 \
            --embed-thumbnail \
            --add-metadata \
            -f "bestvideo[ext=mp4][vcodec^=avc1][height<=2160]+bestaudio[ext=m4a]/bestvideo[ext=mp4][height<=2160]+bestaudio[ext=m4a]/best[ext=mp4]" \
            -o "%(uploader)s/%(upload_date>%Y/%m/%d)s/%(title).200s.%(ext)s" \
            -a canales.txt || true
          fi

      # ☁️ SUBIR VIDEOS
      - name: Upload videos
        run: |
          rclone move . gdrive:YouTubeArchive \
          --exclude ".git/**" \
          --exclude ".github/**" \
          --exclude "cookies.txt" \
          --exclude "canales.txt" \
          --exclude "feeds.txt" \
          --exclude "archive.txt" \
          --transfers 4 \
          --checkers 8 \
          --progress || true

      # 💾 GUARDAR HISTORIAL
      - name: Upload archive
        run: |
          rclone copy archive.txt gdrive:YouTubeArchive/ || true

      # 🧹 LIMPIEZA SEGURA
      - name: Cleanup
        run: |
          find . -type f -name "*.mp4" -delete
