name: YouTube Archive HYBRID

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: youtube-archive
  cancel-in-progress: false

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -U "yt-dlp @ https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz"
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 --decode > ~/.config/rclone/rclone.conf

      # 🔐 ESCRIBIR COOKIES
      - name: Write cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      # 🔥 BAJAR HISTORIAL
      - name: Download archive
        run: |
          rclone copy gdrive:YouTubeArchive/archive.txt . || touch archive.txt

      # ⚡ PASO 1 — RSS (detección rápida)
      - name: Download normal videos (>60s, no live)
        run: |
          yt-dlp -a feeds.txt \
          --cookies cookies.txt \
          --js-runtimes node \
          --remote-components ejs:github \
          --match-filter "duration > 60 & is_live = False" \
          --download-archive archive.txt \
          --no-overwrites \
          --merge-output-format mp4 \
          --embed-thumbnail \
          --add-metadata \
          -f "bestvideo[ext=mp4][vcodec^=avc1][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]" \
          -o "Videos/%(uploader)s/%(title).200s.%(ext)s"

      - name: Download Shorts (≤60s)
        run: |
          yt-dlp -a feeds.txt \
          --cookies cookies.txt \
          --js-runtimes node \
          --remote-components ejs:github \
          --match-filter "duration <= 60 & is_live = False" \
          --download-archive archive.txt \
          --no-overwrites \
          --merge-output-format mp4 \
          --embed-thumbnail \
          --add-metadata \
          -f "bestvideo[ext=mp4][vcodec^=avc1][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]" \
          -o "Shorts/%(uploader)s/%(title).200s.%(ext)s"

      - name: Download Live / Streams
        run: |
          yt-dlp -a feeds.txt \
          --cookies cookies.txt \
          --js-runtimes node \
          --remote-components ejs:github \
          --match-filter "is_live = True" \
          --download-archive archive.txt \
          --no-overwrites \
          --merge-output-format mp4 \
          --embed-thumbnail \
          --add-metadata \
          -f "bestvideo[ext=mp4][vcodec^=avc1][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]" \
          -o "Live/%(uploader)s/%(title).200s.%(ext)s"

      # 🔢 NUMERAR VIDEOS POR CARPETA Y CANAL
      - name: Numerar videos
        run: |
          for tipo in Videos Shorts Live; do
              for canal in "$tipo"/*/ ; do
                  i=1
                  find "$canal" -maxdepth 1 -type f -print0 | sort -z | while IFS= read -r -d '' file; do
                      filename=$(basename "$file")
                      ext="${filename##*.}"
                      name="${filename%.*}"

                      name_no_date=$(echo "$name" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} - //')

                      new_name=$(printf "%s/%03d %s.%s" "$canal" "$i" "$name_no_date" "$ext")

                      mv -n "$file" "$new_name"

                      i=$((i+1))
                  done
              done
          done

      # ☁️ SUBIR VIDEOS
      - name: Upload videos
        run: |
          rclone move . gdrive:YouTubeArchive \
          --exclude ".git/**" \
          --exclude ".github/**" \
          --exclude "cookies.txt" \
          --exclude "feeds.txt" \
          --exclude "archive.txt" \
          --transfers 4 \
          --checkers 8 \
          --progress

      # 💾 GUARDAR HISTORIAL
      - name: Upload archive
        run: |
          rclone copy archive.txt gdrive:YouTubeArchive/

      # 🧹 LIMPIEZA
      - name: Cleanup
        run: |
          rm -rf */*
