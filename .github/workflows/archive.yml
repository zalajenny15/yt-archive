name: YouTube Archive HYBRID

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: youtube-archive
  cancel-in-progress: false

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -U "yt-dlp @ https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz"
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 --decode > ~/.config/rclone/rclone.conf

      # 🔐 ESCRIBIR COOKIES
      - name: Write cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      # 🔥 BAJAR HISTORIAL
      - name: Download archive
        run: |
          rclone copy gdrive:YouTubeArchive/archive.txt . || echo "no archive yet"

      # ⚡ PASO 1 — RSS (detección rápida)
      - name: Download from RSS
        run: |
          yt-dlp \
          --cookies cookies.txt \
          --js-runtimes node \
          --remote-components ejs:github \
          --sleep-requests 2 \
          --sleep-interval 5 \
          --max-sleep-interval 15 \
          --ignore-errors \
          --no-abort-on-error \
          --retries 10 \
          --fragment-retries 10 \
          --download-archive archive.txt \
          --no-overwrites \
          --merge-output-format mp4 \
          --embed-thumbnail \
          --add-metadata \
          -f "bestvideo[ext=mp4][vcodec^=avc1][height<=1080]+bestaudio[ext=m4a][acodec^=mp4a]/best[ext=mp4][height<=1080]" \
          -o "%(uploader)s/%(upload_date>%Y/%m/%d)s/%(title).200s.%(ext)s" \
          -a feeds.txt

      # 🧠 PASO 2 — CANALES (respaldo)
      - name: Download from channels
        run: |
          yt-dlp \
          --cookies cookies.txt \
          --js-runtimes node \
          --remote-components ejs:github \
          --sleep-requests 3 \
          --sleep-interval 10 \
          --max-sleep-interval 30 \
          --ignore-errors \
          --no-abort-on-error \
          --retries 10 \
          --fragment-retries 10 \
          --concurrent-fragments 5 \
          --extractor-args "youtube:player_client=android,web,ios;formats=missing_pot" \
          --download-archive archive.txt \
          --no-overwrites \
          --merge-output-format mp4 \
          --embed-thumbnail \
          --add-metadata \
          -f "bestvideo[ext=mp4][vcodec^=avc1][height<=1080]+bestaudio[ext=m4a][acodec^=mp4a]/best[ext=mp4][height<=1080]" \
          -o "%(uploader)s/%(upload_date>%Y/%m/%d)s/%(title).200s.%(ext)s" \
          -a canales.txt

      # ☁️ SUBIR VIDEOS
      - name: Upload videos
        run: |
          rclone move . gdrive:YouTubeArchive \
          --exclude ".git/**" \
          --exclude ".github/**" \
          --exclude "cookies.txt" \
          --exclude "canales.txt" \
          --exclude "feeds.txt" \
          --exclude "archive.txt" \
          --transfers 4 \
          --checkers 8 \
          --progress

      # 💾 GUARDAR HISTORIAL
      - name: Upload archive
        run: |
          rclone copy archive.txt gdrive:YouTubeArchive/

      # 🧹 LIMPIEZA
      - name: Cleanup
        run: |
          rm -rf */*
